name: Captura Mínima (Lowest Temperature)

# Observação: grava o mercado de MÍNIMA das cidades cobertas + a hora mais fria
# prevista, em dados_low/. Não aposta.
#
# AGENDAMENTO DESLIGADO (22/07): a captura da mínima agora roda pendurada no
# digest de 10 min (main.yml), que é confiável — o cron próprio era estrangulado
# pelo GitHub. Este workflow fica só para disparo manual (workflow_dispatch).
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lowtemp-live
  cancel-in-progress: false

jobs:
  capturar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar buffer da captura (mínima)
        uses: actions/cache@v4
        with:
          path: data_low
          key: lowtemp-live-${{ github.run_id }}
          restore-keys: |
            lowtemp-live-

      - name: Capturar mínima
        env:
          POLYMARKET_WALLET: ${{ vars.POLYMARKET_WALLET }}
        run: python -m lowtemp.capture

      - name: Commitar dados_low
        if: always()
        run: |
          if [ ! -d dados_low ]; then
            echo "sem parquet ainda (nada a commitar)"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados_low
          if git diff --cached --quiet; then
            echo "sem dados novos"; exit 0
          fi
          git commit -m "Arquiva captura de mínima ($(date -u +%F)) [skip ci]"
          for i in 1 2 3 4; do
            if git push origin HEAD:main; then exit 0; fi
            echo "push falhou (tentativa $i) — rebase e retry"
            git pull --rebase origin main || true
            sleep $((i * 3))
          done
          echo "não consegui commitar (segue sem falhar)"; exit 0
