name: Relatório diário da Ceifa

on:
  schedule:
    - cron: "0 9 * * *"        # 09:00 UTC = 06:00 em Brasília
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ceifa-report
  cancel-in-progress: false

jobs:
  relatorio:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar relatório da Ceifa (cidades ativas °C)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_ceifa.py

      # Segunda mensagem, apartada: monitoramento das cidades americanas (°F).
      # Acessório — se falhar, não bloqueia o relatório principal.
      - name: Enviar relatório da Ceifa °F (monitoramento)
        continue-on-error: true
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_ceifa_f.py

      # (Ceifa Futebol in-play PAUSADA em 21/07 — in-play dinâmico demais para o
      # ritmo do Actions. run_ceifa_futebol.py segue no repo para retomada.)

      - name: Avisar falha no Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS --max-time 30 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ O relatório diário da Ceifa falhou. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "aviso de falha também não foi entregue"
