name: Backtest de sinais

on:
  schedule:
    - cron: "0 9 */3 * *"   # a cada 3 dias, 09:00 UTC (06:00 em Brasília)
  workflow_dispatch:

permissions:
  contents: write           # para commitar os dias novos de backtest_data/

concurrency:
  group: backtest-tmax
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar dias novos, simular e enviar relatório
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_backtest.py

      # O arquivo é append-only: cada rodada acrescenta os dias novos e o
      # commit preserva os dados além das janelas de retenção das fontes.
      - name: Commitar dias novos do arquivo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backtest_data
          git diff --cached --quiet || {
            git commit -m "Arquiva dados de backtest ($(date -u +%F))"
            git push
          }

      - name: Avisar falha no Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS --max-time 30 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ O backtest de sinais falhou. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "aviso de falha também não foi entregue"
