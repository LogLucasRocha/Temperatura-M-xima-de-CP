name: Previsão Tmax → Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:        

permissions:
  contents: write  # commitar o arquivo de dados ao vivo (dados/) 1x/dia
  actions: write   # watchdog: disparar o backtest se o agendado for pulado

concurrency:
  group: telegram-tmax
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # data/ guarda o cache do viés (recalculado 1x/dia) e o estado do último
      # digest (para omitir estações sem novidade). A chave é única por run,
      # então cada execução salva um cache novo e a próxima restaura o mais
      # recente via restore-keys.
      - name: Restaurar caches (viés + estado do digest)
        uses: actions/cache@v4
        with:
          path: data
          key: tmax-data-${{ github.run_id }}
          restore-keys: |
            tmax-data-

      - name: Enviar previsão pro Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYMARKET_WALLET: ${{ vars.POLYMARKET_WALLET }}
        run: python send_telegram.py

      # Arquivo de dados ao vivo: o send_telegram acumula num buffer no cache
      # (data/capture) e, quando o dia UTC fecha, consolida em dados/*.parquet.
      # Este passo commita dados/ só quando há novidade — na prática 1x/dia,
      # na 1ª rodada após 00:00 UTC. Nunca derruba o job (arquivo é acessório).
      - name: Commitar arquivo de dados ao vivo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dados
          if git diff --cached --quiet; then
            echo "sem dados novos para commitar"; exit 0
          fi
          git commit -m "Arquiva dados ao vivo ($(date -u +%F)) [skip ci]"
          for i in 1 2 3 4; do
            if git push origin HEAD:main; then exit 0; fi
            echo "push falhou (tentativa $i) — rebase e retry"
            git pull --rebase origin main || true
            sleep $((i * 3))
          done
          echo "não consegui commitar o arquivo de dados (segue sem falhar)"; exit 0

      # O agendador do GitHub pula/atrasa crons com frequência (aconteceu em
      # 13/07: o backtest das 09:00 UTC simplesmente não disparou). Este
      # watchdog roda a cada rodada do digest: nos dias de backtest (1, 4,
      # 7, ... — passo 3 a partir do dia 1), depois das 09:00 UTC, se não
      # houver execução bem-sucedida nem em andamento hoje, dispara o
      # workflow via API — e repete a cada rodada até um sucesso.
      - name: Watchdog do backtest
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          dia=$(date -u +%-d); hora=$(date -u +%-H); hoje=$(date -u +%F)
          if [ $(( (dia - 1) % 3 )) -ne 0 ] || [ "$hora" -lt 9 ]; then
            echo "hoje não é dia de backtest (ou ainda é cedo)"; exit 0
          fi
          runs=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/backtest.yml/runs?created=$hoje..$hoje&per_page=20")
          ok=$(echo "$runs" | python3 -c "import json,sys; d=json.load(sys.stdin); print('sim' if any(r['status'] in ('queued','in_progress') or r.get('conclusion')=='success' for r in d.get('workflow_runs',[])) else 'nao')")
          if [ "$ok" = "nao" ]; then
            curl -sS -X POST -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/actions/workflows/backtest.yml/dispatches" \
              -d '{"ref":"main"}'
            echo "backtest de hoje não rodou — disparado pelo watchdog"
          else
            echo "backtest de hoje já rodou (ou está rodando)"
          fi

      - name: Avisar falha no Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS --max-time 30 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ O digest de Tmax falhou. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "aviso de falha também não foi entregue"
