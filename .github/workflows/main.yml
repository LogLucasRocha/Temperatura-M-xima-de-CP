name: Previsão Tmax → Telegram

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:        

concurrency:
  group: telegram-tmax
  cancel-in-progress: false

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      # data/ guarda o cache do viés (recalculado 1x/dia) e o estado do último
      # digest (para omitir estações sem novidade). A chave é única por run,
      # então cada execução salva um cache novo e a próxima restaura o mais
      # recente via restore-keys.
      - name: Restaurar caches (viés + estado do digest)
        uses: actions/cache@v4
        with:
          path: data
          key: tmax-data-${{ github.run_id }}
          restore-keys: |
            tmax-data-

      - name: Enviar previsão pro Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POLYMARKET_WALLET: ${{ vars.POLYMARKET_WALLET }}
        run: python send_telegram.py

      - name: Avisar falha no Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS --max-time 30 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ O digest de Tmax falhou. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "aviso de falha também não foi entregue"
